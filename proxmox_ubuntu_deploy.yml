#
# Proxmox Ubuntu VM Deployment Ansible Playbook
# Copyright (c) 2026 Darren Soothill
#
# Deploys a fresh Ubuntu VM on a Proxmox host using a cloud-init template,
# creates a 'darren' user with SSH keys pulled from GitHub, installs LLDP
# and Zeroconf (Avahi), enables SSH, and fully patches the system.
#
# Author: Darren Soothill
#
# Prerequisites:
#   - A Proxmox host accessible at proxmox.local with SSH configured
#   - If no Ubuntu cloud-init template exists at the given VMID (default: 9000),
#     the playbook will create one automatically from the Ubuntu Noble cloud image.
#   - community.general collection installed:
#       ansible-galaxy collection install community.general
#
# Usage:
#   ansible-playbook proxmox_ubuntu_deploy.yml \
#     -e "new_hostname=myserver" \
#     -e "proxmox_api_password=secret"
#
# Variables:
#   new_hostname          - (REQUIRED) Name/hostname for the new Ubuntu VM
#   proxmox_api_password  - (REQUIRED) Proxmox root password for API access
#   proxmox_node          - Proxmox node name (default: proxmox)
#   proxmox_api_user      - Proxmox API user (default: root)
#   template_vmid         - VMID of the Ubuntu cloud-init template (default: 9000)
#   vm_cores              - Number of vCPU cores (default: 2)
#   vm_memory             - RAM in MB (default: 2048)
#   vm_disk_size          - Disk size to resize to (default: 20G)
#   vm_storage            - Proxmox storage pool name (default: RaidZ)
#   vm_network_bridge     - Proxmox network bridge (default: vmbr10g)
#   github_user           - GitHub username to pull SSH keys from (default: soothill)
#   deploy_user           - Linux user to create on the new VM (default: darren)
#

---

# ---------------------------------------------------------------------------
# Play 1: Create and initialise the VM on the Proxmox host
# ---------------------------------------------------------------------------
- name: Create Ubuntu VM on Proxmox
  hosts: proxmox.local
  gather_facts: false
  vars:
    new_hostname: "{{ new_hostname | mandatory('Pass -e new_hostname=<hostname>') }}"
    proxmox_node: "proxmox"
    proxmox_api_user: "root"
    template_vmid: 9000
    vm_cores: 2
    vm_memory: 2048
    vm_disk_size: "20G"
    vm_storage: "RaidZ"
    vm_network_bridge: "vmbr10g"
    github_user: "soothill"
    deploy_user: "darren"
    deploy_user_password: ""

  tasks:
    - name: Fetch SSH public keys from GitHub ({{ github_user }})
      uri:
        url: "https://github.com/{{ github_user }}.keys"
        return_content: yes
      register: github_keys
      delegate_to: localhost

    - name: Fail if no SSH keys found for GitHub user {{ github_user }}
      fail:
        msg: "No SSH keys found at https://github.com/{{ github_user }}.keys"
      when: github_keys.content | trim == ""

    - name: Write GitHub SSH keys to temp file on Proxmox host
      copy:
        content: "{{ github_keys.content }}"
        dest: "/tmp/{{ new_hostname }}_sshkeys.pub"
        mode: "0600"

    - name: Get next available VMID from Proxmox cluster
      command: pvesh get /cluster/nextid
      register: next_vmid
      changed_when: false

    - name: Check that cloud-init template (VMID {{ template_vmid }}) exists
      command: qm config {{ template_vmid }}
      register: template_check
      changed_when: false
      failed_when: false

    - name: Auto-create template – download Ubuntu Noble cloud image
      get_url:
        url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
        dest: /tmp/noble-server-cloudimg-amd64.img
        mode: "0644"
      when: template_check.rc != 0

    - name: Auto-create template – create base VM (VMID {{ template_vmid }})
      command: >
        qm create {{ template_vmid }}
        --name ubuntu-noble-template
        --memory 2048
        --net0 virtio,bridge={{ vm_network_bridge }}
        --scsihw virtio-scsi-pci
      when: template_check.rc != 0

    - name: Auto-create template – import disk into {{ vm_storage }}
      command: >
        qm importdisk {{ template_vmid }}
        /tmp/noble-server-cloudimg-amd64.img
        {{ vm_storage }}
      when: template_check.rc != 0

    - name: Auto-create template – read config to get imported disk identifier
      command: qm config {{ template_vmid }}
      register: template_config_after_import
      changed_when: false
      when: template_check.rc != 0

    - name: Auto-create template – attach disk, cloud-init drive, boot order, and agent
      command: >
        qm set {{ template_vmid }}
        --scsi0 {{ template_config_after_import.stdout | regex_search('unused0:\s*(\S+)', '\1') | first }}
        --ide2 {{ vm_storage }}:cloudinit
        --boot c
        --bootdisk scsi0
        --vga std
        --agent enabled=1
      when: template_check.rc != 0

    - name: Auto-create template – convert VM to template
      command: qm template {{ template_vmid }}
      when: template_check.rc != 0

    - name: Auto-create template – remove downloaded image
      file:
        path: /tmp/noble-server-cloudimg-amd64.img
        state: absent
      when: template_check.rc != 0

    - name: Clone Ubuntu cloud-init template (VMID {{ template_vmid }}) to new VM
      command: >
        qm clone {{ template_vmid }} {{ next_vmid.stdout | trim }}
        --name {{ new_hostname }}
        --full
        --storage {{ vm_storage }}
      register: clone_result

    - name: Configure VM hardware and cloud-init settings
      command: >
        qm set {{ next_vmid.stdout | trim }}
        --cores {{ vm_cores }}
        --memory {{ vm_memory }}
        --net0 virtio,bridge={{ vm_network_bridge }}
        --ipconfig0 ip=dhcp
        --ciuser {{ deploy_user }}
        --sshkeys /tmp/{{ new_hostname }}_sshkeys.pub
        --nameserver 8.8.8.8
        --searchdomain local
        --vga std
        --agent enabled=1

    - name: Set cloud-init password for {{ deploy_user }}
      command:
        argv:
          - qm
          - set
          - "{{ next_vmid.stdout | trim }}"
          - "--cipassword"
          - "{{ deploy_user_password }}"
      when: deploy_user_password | length > 0
      no_log: true

    - name: Resize VM disk to {{ vm_disk_size }}
      command: >
        qm resize {{ next_vmid.stdout | trim }} scsi0 {{ vm_disk_size }}

    # Inject a vendor-data snippet so cloud-init installs qemu-guest-agent
    # during first boot.  This must happen before the VM starts so that the
    # guest-agent wait below actually succeeds.
    - name: Ensure Proxmox snippets directory exists
      file:
        path: /var/lib/vz/snippets
        state: directory
        mode: "0755"

    - name: Write cloud-init vendor-data snippet (installs qemu-guest-agent on first boot)
      copy:
        dest: "/var/lib/vz/snippets/{{ new_hostname }}-vendor.yaml"
        mode: "0644"
        content: |
          #cloud-config
          packages:
            - qemu-guest-agent
          runcmd:
            - [ systemctl, enable, --now, qemu-guest-agent ]

    - name: Apply vendor-data snippet to VM via cicustom
      command: >
        qm set {{ next_vmid.stdout | trim }}
        --cicustom "vendor=local:snippets/{{ new_hostname }}-vendor.yaml"

    - name: Regenerate cloud-init ISO to include vendor-data
      command: qm cloudinit update {{ next_vmid.stdout | trim }}
      changed_when: true

    - name: Start the new VM
      command: qm start {{ next_vmid.stdout | trim }}

    - name: Wait for QEMU guest agent to become available
      command: qm guest cmd {{ next_vmid.stdout | trim }} ping
      register: agent_ping
      retries: 30
      delay: 10
      until: agent_ping.rc == 0
      failed_when: false
      changed_when: false

    - name: Wait for VM to acquire a DHCP address
      command: qm guest cmd {{ next_vmid.stdout | trim }} network-get-interfaces
      register: vm_network_raw
      retries: 30
      delay: 5
      until: >-
        vm_network_raw.rc == 0 and
        (vm_network_raw.stdout | length) > 0 and
        (vm_network_raw.stdout | from_json
        | selectattr('name', 'ne', 'lo')
        | map(attribute='ip-addresses')
        | flatten
        | selectattr('ip-address-type', 'eq', 'ipv4')
        | list | length) > 0
      changed_when: false
      failed_when: false

    - name: Parse VM IP address
      set_fact:
        vm_ip: >-
          {{ (vm_network_raw.stdout | from_json)
             | selectattr('name', 'ne', 'lo')
             | map(attribute='ip-addresses')
             | flatten
             | selectattr('ip-address-type', 'eq', 'ipv4')
             | rejectattr('ip-address', 'match', '^169\.254\.')
             | map(attribute='ip-address')
             | reject('match', '^169\\.254\\.')
             | first }}

    - name: Display new VM connection info
      debug:
        msg:
          - "VM '{{ new_hostname }}' deployed successfully"
          - "VMID : {{ next_vmid.stdout | trim }}"
          - "IP   : {{ vm_ip }}"
          - "mDNS : {{ new_hostname }}.local"
          - "User : {{ deploy_user }}"

    - name: Remove temporary SSH keys file from Proxmox host
      file:
        path: "/tmp/{{ new_hostname }}_sshkeys.pub"
        state: absent

    - name: Remove cloud-init vendor-data snippet
      file:
        path: "/var/lib/vz/snippets/{{ new_hostname }}-vendor.yaml"
        state: absent

    - name: Add new VM to in-memory inventory for configuration play
      add_host:
        name: "{{ new_hostname }}"
        groups: newly_deployed
        ansible_host: "{{ vm_ip }}"
        ansible_user: "{{ deploy_user }}"
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=accept-new"

# ---------------------------------------------------------------------------
# Play 2: Configure the newly deployed Ubuntu VM
# ---------------------------------------------------------------------------
- name: Configure Ubuntu VM
  hosts: newly_deployed
  become: yes
  gather_facts: no
  vars:
    github_user: "soothill"
    deploy_user: "darren"
    deploy_user_password: ""

  tasks:
    - name: Wait for SSH to become available
      wait_for_connection:
        timeout: 300
        delay: 15

    - name: Gather system facts
      setup:

    - name: Set system hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Update /etc/hosts with hostname
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ inventory_hostname }} {{ inventory_hostname }}.local"
        state: present

    # -----------------------------------------------------------------------
    # Patching - bring the system fully up to date
    # -----------------------------------------------------------------------
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 0   # Force refresh on first run

    - name: Upgrade all packages to latest versions (dist-upgrade)
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    # -----------------------------------------------------------------------
    # Package installation
    # -----------------------------------------------------------------------
    - name: Install required packages
      apt:
        name:
          - openssh-server       # SSH daemon
          - qemu-guest-agent     # Proxmox guest agent (enables IP reporting and graceful shutdown)
          - lldpd                # LLDP – link layer discovery
          - avahi-daemon         # Zeroconf / mDNS
          - avahi-utils          # avahi-browse and friends
          - libnss-mdns          # NSS plugin so .local names resolve
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
          - unattended-upgrades  # Automatic security updates
          - apt-listchanges
        state: present
        update_cache: no

    # -----------------------------------------------------------------------
    # Core services – start immediately after install
    # -----------------------------------------------------------------------
    - name: Ensure qemu-guest-agent is enabled and started
      systemd:
        name: qemu-guest-agent
        state: started
        enabled: yes
        daemon_reload: yes

    # -----------------------------------------------------------------------
    # SSH
    # -----------------------------------------------------------------------
    - name: Ensure SSH service is enabled and started
      systemd:
        name: ssh
        state: started
        enabled: yes

    - name: Harden SSH – disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
      notify: Restart SSH

    - name: Harden SSH – disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"
        state: present
      notify: Restart SSH

    # -----------------------------------------------------------------------
    # User: darren
    # -----------------------------------------------------------------------
    - name: Ensure user '{{ deploy_user }}' exists
      user:
        name: "{{ deploy_user }}"
        state: present
        shell: /bin/bash
        groups: sudo
        append: yes
        create_home: yes

    - name: Set password for {{ deploy_user }}
      user:
        name: "{{ deploy_user }}"
        password: "{{ deploy_user_password | password_hash('sha512') }}"
        update_password: always
      when: deploy_user_password | length > 0
      no_log: true

    - name: Fetch SSH public keys from GitHub ({{ github_user }})
      uri:
        url: "https://github.com/{{ github_user }}.keys"
        return_content: yes
      register: github_keys
      delegate_to: localhost

    - name: Deploy GitHub SSH keys to {{ deploy_user }} authorized_keys
      authorized_key:
        user: "{{ deploy_user }}"
        key: "{{ github_keys.content }}"
        state: present
        exclusive: no

    - name: Allow {{ deploy_user }} passwordless sudo
      copy:
        content: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ deploy_user }}"
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"

    # -----------------------------------------------------------------------
    # LLDP
    # -----------------------------------------------------------------------
    - name: Configure LLDP to run on all interfaces
      copy:
        content: |
          # Managed by Ansible
          [lldpd]
          configure system interface pattern *
        dest: /etc/lldpd.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart lldpd

    - name: Ensure lldpd service is enabled and started
      systemd:
        name: lldpd
        state: started
        enabled: yes

    # -----------------------------------------------------------------------
    # Zeroconf / mDNS (Avahi)
    # -----------------------------------------------------------------------
    - name: Ensure avahi-daemon service is enabled and started
      systemd:
        name: avahi-daemon
        state: started
        enabled: yes

    - name: Configure NSS to resolve .local via mDNS
      lineinfile:
        path: /etc/nsswitch.conf
        regexp: "^hosts:"
        line: "hosts:          files mdns4_minimal [NOTFOUND=return] dns"
        state: present

    # -----------------------------------------------------------------------
    # Automatic security updates
    # -----------------------------------------------------------------------
    - name: Enable automatic security updates (unattended-upgrades)
      copy:
        content: |
          // Managed by Ansible
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"

    # -----------------------------------------------------------------------
    # Reboot if kernel or core libraries were updated
    # -----------------------------------------------------------------------
    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot system if required after patching
      reboot:
        msg: "Rebooting after system updates – back shortly"
        reboot_timeout: 300
      when: reboot_required.stat.exists

    - name: Wait for system to come back online after reboot
      wait_for_connection:
        timeout: 300
        delay: 10
      when: reboot_required.stat.exists

    - name: Confirm final system state
      debug:
        msg:
          - "Host      : {{ inventory_hostname }}"
          - "IP        : {{ ansible_host }}"
          - "mDNS      : {{ inventory_hostname }}.local"
          - "SSH user  : {{ deploy_user }}"
          - "LLDP      : enabled"
          - "Zeroconf  : enabled"
          - "Patching  : complete"

  handlers:
    - name: Restart SSH
      systemd:
        name: ssh
        state: restarted

    - name: Restart lldpd
      systemd:
        name: lldpd
        state: restarted
